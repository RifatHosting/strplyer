<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopMaster - Belanja Online Terpercaya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff5a5a;
            --primary-dark: #e04545;
            --bg-main: #f8f9fa;
            --text-primary: #1f2937;
        }
        * { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg-main); }
        
        /* Header */
        .main-header { background: linear-gradient(135deg, #ff5a5a 0%, #ff8a5b 100%); }
        .search-box { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); }
        .search-box:focus-within { background: white; border-color: white; }
        .search-box input { background: transparent; }
        .search-box:focus-within input { color: #333; }
        .search-box input::placeholder { color: rgba(255,255,255,0.8); }
        .search-box:focus-within input::placeholder { color: #999; }

        /* Banner */
        .banner-slider { overflow: hidden; border-radius: 16px; }
        .banner-track { display: flex; transition: transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1); }
        .banner-slide { min-width: 100%; aspect-ratio: 2.5; }
        .banner-slide img { width: 100%; height: 100%; object-fit: cover; }

        /* Product Card */
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid #f0f0f0;
            cursor: pointer;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border-color: transparent;
        }
        .product-img-box { position: relative; overflow: hidden; aspect-ratio: 1; }
        .product-img-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .product-card:hover .product-img-box img { transform: scale(1.08); }
        
        /* Flash Sale */
        .fs-timer { background: #1f2937; color: white; padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 14px; min-width: 36px; text-align: center; }

        /* Cart Drawer */
        .cart-drawer {
            position: fixed; top: 0; right: 0;
            width: 100%; max-width: 420px; height: 100vh;
            background: white; z-index: 300;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; box-shadow: -10px 0 40px rgba(0,0,0,0.1);
        }
        .cart-drawer.active { transform: translateX(0); }
        
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #eee; z-index: 50; display: flex; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0; color: #888; font-size: 10px; cursor: pointer; transition: color 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        
        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(2px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 500px; max-height: 90vh; border-radius: 24px 24px 0 0; overflow-y: auto; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* Button */
        .btn-main { background: var(--primary); color: white; padding: 14px; border-radius: 12px; font-weight: 600; border: none; width: 100%; cursor: pointer; transition: background 0.2s; }
        .btn-main:hover { background: var(--primary-dark); }
        
        /* Toast */
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 50px; display: none; z-index: 400; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .toast.show { display: block; animation: fadeUp 0.3s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

        @media (min-width: 1024px) { .bottom-nav { display: none; } }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="main-header sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center gap-4">
                <a href="#" class="text-white font-extrabold text-2xl tracking-tight hidden md:block">ShopMaster</a>
                <div class="flex-1 max-w-2xl">
                    <div class="search-box flex items-center rounded-full overflow-hidden px-4 py-3">
                        <input type="text" id="search-input" placeholder="Cari produk impianmu..." class="flex-1 outline-none text-white text-sm">
                        <button onclick="searchProducts()" class="text-white text-lg ml-2"><i class="fas fa-search"></i></button>
                    </div>
                </div>
                <button onclick="openCart()" class="relative text-white">
                    <i class="fas fa-shopping-bag text-2xl"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 w-5 h-5 bg-yellow-400 text-gray-900 text-xs font-bold rounded-full flex items-center justify-center">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        
        <!-- Banner -->
        <section class="mb-6">
            <div class="banner-slider" id="banner-slider">
                <div class="banner-track" id="banner-track"></div>
            </div>
        </section>

        <!-- Categories -->
        <section class="bg-white rounded-2xl p-4 mb-6 shadow-sm">
            <div class="flex overflow-x-auto gap-4 pb-2 scrollbar-hide" id="categories-grid">
                <!-- Cats loaded here -->
            </div>
        </section>

        <!-- Flash Sale -->
        <section class="mb-6">
            <div class="bg-gradient-to-r from-red-500 to-orange-400 rounded-t-2xl p-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <i class="fas fa-bolt text-yellow-300 text-xl"></i>
                    <span class="text-white font-bold text-lg">FLASH SALE</span>
                </div>
                <div class="flex gap-1 items-center">
                    <span class="fs-timer" id="h">00</span><span class="text-white mx-1">:</span>
                    <span class="fs-timer" id="m">00</span><span class="text-white mx-1">:</span>
                    <span class="fs-timer" id="s">00</span>
                </div>
            </div>
            <div class="bg-white rounded-b-2xl p-4 border border-t-0 border-red-100">
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3" id="flash-sale-grid">
                    <!-- Flash sale items -->
                </div>
            </div>
        </section>

        <!-- Products -->
        <section>
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">Produk Untuk Kamu</h2>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4" id="products-grid">
                <!-- Products -->
            </div>
            <div class="text-center mt-10">
                <button onclick="loadMoreProducts()" class="px-8 py-3 border-2 border-gray-200 text-gray-600 font-medium rounded-full hover:bg-gray-50 hover:border-gray-300 transition-colors">Lihat Lebih Banyak</button>
            </div>
        </section>

    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav md:hidden">
        <div class="nav-item active"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item"><i class="fas fa-th-large"></i><span>Kategori</span></div>
        <div class="nav-item" onclick="openCart()"><i class="fas fa-shopping-bag"></i><span>Keranjang</span></div>
        <div class="nav-item"><i class="fas fa-heart"></i><span>Wishlist</span></div>
        <div class="nav-item"><i class="fas fa-user"></i><span>Akun</span></div>
    </nav>

    <!-- Product Detail Modal -->
    <div class="modal-overlay" id="product-modal">
        <div class="modal-content" id="product-detail-content">
            <!-- Dynamic content -->
        </div>
    </div>

    <!-- Cart Drawer -->
    <div class="fixed inset-0 bg-black/30 z-250 hidden" id="cart-overlay" onclick="closeCart()"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="p-6 border-b flex justify-between items-center">
            <h3 class="font-bold text-xl text-gray-800">Keranjang</h3>
            <button onclick="closeCart()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        <div class="flex-1 overflow-y-auto p-6" id="cart-items">
            <!-- Items -->
        </div>
        <div class="p-6 border-t bg-gray-50">
            <div class="flex justify-between mb-4">
                <span class="text-gray-500">Total</span>
                <span class="text-xl font-bold text-gray-800" id="cart-total">Rp 0</span>
            </div>
            <button class="btn-main" onclick="checkout()">Checkout Sekarang</button>
        </div>
    </div>

    <div class="toast" id="toast">Ditambahkan ke keranjang</div>

    <script>
        // ==========================================
        // KONFIGURASI SUPABASE - PASTE DI SINI
        // ==========================================
        const SUPABASE_URL = 'https://ipdzrgctpfugquditjyr.supabase.co'; // Ganti dengan URL Anda
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwZHpyZ2N0cGZ1Z3F1ZGl0anlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTgxOTcsImV4cCI6MjA4ODI3NDE5N30.Z1Hkyaip0zPK70ygSh3GxC6SIRjg9lbp-haAH2CJ8uA'; // Ganti dengan Anon Key Anda
        // ==========================================

        let supabase = null;
        if (SUPABASE_URL !== 'https://YOUR_PROJECT_URL.supabase.co' && SUPABASE_KEY !== 'YOUR_ANON_KEY') {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let allProducts = [];
        let currentSlide = 0;
        let displayCount = 10;

        document.addEventListener('DOMContentLoaded', () => {
            updateCartUI();
            if(supabase) {
                loadBanners();
                loadCategories();
                loadProducts();
            } else {
                 document.getElementById('products-grid').innerHTML = '<div class="col-span-full text-center py-12 text-gray-400">Koneksi database belum diatur.</div>';
            }
            startCountdown();
        });

        // --- LOADERS ---
        async function loadBanners() {
            const { data } = await supabase.from('banners').select('*').eq('is_active', true);
            const track = document.getElementById('banner-track');
            if(!data || data.length === 0) {
                track.innerHTML = '<div class="banner-slide"><img src="https://images.unsplash.com/photo-1607082349566-187342175e2f?w=1200&h=400&fit=crop"></div>';
                return;
            }
            track.innerHTML = data.map(b => `<div class="banner-slide"><img src="${b.image_url}" alt="${b.title}"></div>`).join('');
            setInterval(() => {
                currentSlide = (currentSlide + 1) % data.length;
                track.style.transform = `translateX(-${currentSlide * 100}%)`;
            }, 4000);
        }

        async function loadCategories() {
            const { data } = await supabase.from('categories').select('*').limit(10);
            const grid = document.getElementById('categories-grid');
            grid.innerHTML = (data || []).map(c => `
                <div onclick="filterByCategory('${c.id}')" class="flex flex-col items-center min-w-[70px] cursor-pointer group">
                    <div class="w-14 h-14 rounded-2xl bg-red-50 flex items-center justify-center mb-2 group-hover:bg-red-100 transition-colors">
                        <i class="${c.icon || 'fas fa-tag'} text-red-500 text-lg"></i>
                    </div>
                    <span class="text-xs text-gray-600 font-medium whitespace-nowrap">${c.name}</span>
                </div>
            `).join('');
        }

        async function loadProducts() {
            const { data } = await supabase.from('products').select('*, categories(name)').order('created_at', { ascending: false });
            allProducts = data || [];
            renderProducts();
            renderFlashSale();
        }

        function renderProducts() {
            const toShow = allProducts.slice(0, displayCount);
            const grid = document.getElementById('products-grid');
            grid.innerHTML = toShow.map(p => productCardHTML(p)).join('');
        }

        function loadMoreProducts() { displayCount += 10; renderProducts(); }

        function renderFlashSale() {
            const fs = allProducts.filter(p => p.discount > 10).slice(0, 6);
            document.getElementById('flash-sale-grid').innerHTML = fs.map(p => productCardHTML(p, true)).join('');
        }

        function productCardHTML(p, mini = false) {
            const fp = p.discount > 0 ? Math.round(p.price * (1 - p.discount / 100)) : p.price;
            return `
                <div class="product-card" onclick="openProduct('${p.id}')">
                    <div class="product-img-box">
                        <img src="${p.image || 'https://via.placeholder.com/200'}" alt="${p.name}">
                        ${p.discount > 0 ? `<span class="absolute top-2 left-2 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded">${p.discount}%</span>` : ''}
                    </div>
                    <div class="p-3 flex-1 flex flex-col">
                        <h3 class="text-sm text-gray-800 font-medium line-clamp-2 mb-2 leading-snug">${p.name}</h3>
                        <div class="mt-auto">
                            <p class="text-red-500 font-bold ${mini ? 'text-sm' : ''}">Rp ${fp.toLocaleString('id-ID')}</p>
                            ${p.discount > 0 ? `<p class="text-gray-400 text-xs line-through">Rp ${p.price.toLocaleString('id-ID')}</p>` : ''}
                            <div class="flex items-center gap-1 mt-2 text-gray-400 text-xs">
                                <i class="fas fa-star text-yellow-400"></i> ${p.rating?.toFixed(1) || '4.5'} | ${p.sold || 0} terjual
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- INTERACTIONS ---
        async function openProduct(id) {
            const { data: p } = await supabase.from('products').select('*').eq('id', id).single();
            if(!p) return;
            const fp = p.discount > 0 ? Math.round(p.price * (1 - p.discount / 100)) : p.price;
            document.getElementById('product-detail-content').innerHTML = `
                <div class="relative">
                    <button onclick="closeProductModal()" class="absolute top-4 right-4 z-10 w-10 h-10 bg-white/80 backdrop-blur rounded-full flex items-center justify-center text-gray-600 shadow">&times;</button>
                    <img src="${p.image}" class="w-full aspect-square object-cover">
                </div>
                <div class="p-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-2">${p.name}</h2>
                    <div class="flex items-end gap-3 mb-4">
                        <span class="text-3xl font-bold text-red-500">Rp ${fp.toLocaleString('id-ID')}</span>
                        ${p.discount > 0 ? `<span class="text-gray-400 line-through text-lg">Rp ${p.price.toLocaleString('id-ID')}</span>` : ''}
                    </div>
                    <div class="flex gap-4 text-sm text-gray-500 mb-6 pb-4 border-b">
                        <span><i class="fas fa-star text-yellow-400"></i> ${p.rating?.toFixed(1) || '4.5'}</span>
                        <span>${p.sold || 0} Terjual</span>
                        <span>Stok: ${p.stock}</span>
                    </div>
                    ${p.description ? `<p class="text-gray-600 text-sm mb-6">${p.description}</p>` : ''}
                    <div class="flex gap-3">
                        <button onclick="addToCartDirect('${p.id}')" class="flex-1 py-3 border-2 border-red-500 text-red-500 font-bold rounded-xl hover:bg-red-50 transition-colors">+ Keranjang</button>
                        <button onclick="buyNow('${p.id}')" class="flex-1 py-3 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 transition-colors shadow-lg shadow-red-200">Beli</button>
                    </div>
                </div>
            `;
            document.getElementById('product-modal').classList.add('active');
        }

        function closeProductModal() { document.getElementById('product-modal').classList.remove('active'); }
        
        async function addToCartDirect(id) {
            const { data: p } = await supabase.from('products').select('*').eq('id', id).single();
            if(!p) return;
            const fp = p.discount > 0 ? Math.round(p.price * (1 - p.discount / 100)) : p.price;
            const exist = cart.find(i => i.id === id);
            if(exist) exist.qty++; else cart.push({ id, name: p.name, price: fp, image: p.image, qty: 1 });
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartUI();
            closeProductModal();
            showToast('Ditambahkan ke keranjang');
        }

        async function buyNow(id) { await addToCartDirect(id); openCart(); }

        // Cart System
        function updateCartUI() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cart-count').textContent = count;
            const itemsDiv = document.getElementById('cart-items');
            if(cart.length === 0) { itemsDiv.innerHTML = '<div class="text-center text-gray-400 py-12"><i class="fas fa-shopping-bag text-4xl mb-4"></i><p>Keranjang kosong</p></div>'; document.getElementById('cart-total').textContent = 'Rp 0'; return; }
            itemsDiv.innerHTML = cart.map((i, idx) => `
                <div class="flex gap-4 mb-4 pb-4 border-b">
                    <img src="${i.image}" class="w-20 h-20 rounded-xl object-cover">
                    <div class="flex-1">
                        <h4 class="font-medium text-gray-800 text-sm mb-1">${i.name}</h4>
                        <p class="text-red-500 font-bold">Rp ${i.price.toLocaleString('id-ID')}</p>
                        <div class="flex items-center justify-between mt-2">
                            <div class="flex items-center border rounded-lg">
                                <button onclick="updateQty(${idx}, -1)" class="px-3 py-1 text-gray-500 hover:bg-gray-100">-</button>
                                <span class="px-3 text-sm font-medium">${i.qty}</span>
                                <button onclick="updateQty(${idx}, 1)" class="px-3 py-1 text-gray-500 hover:bg-gray-100">+</button>
                            </div>
                            <button onclick="removeItem(${idx})" class="text-red-400 text-sm hover:text-red-600">Hapus</button>
                        </div>
                    </div>
                </div>
            `).join('');
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('cart-total').textContent = `Rp ${total.toLocaleString('id-ID')}`;
        }

        function updateQty(idx, delta) { cart[idx].qty += delta; if(cart[idx].qty < 1) cart.splice(idx, 1); localStorage.setItem('cart', JSON.stringify(cart)); updateCartUI(); }
        function removeItem(idx) { cart.splice(idx, 1); localStorage.setItem('cart', JSON.stringify(cart)); updateCartUI(); }
        
        function openCart() { document.getElementById('cart-overlay').classList.remove('hidden'); document.getElementById('cart-drawer').classList.add('active'); }
        function closeCart() { document.getElementById('cart-overlay').classList.add('hidden'); document.getElementById('cart-drawer').classList.remove('active'); }

        async function checkout() {
            if(cart.length === 0) return;
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const { data: order } = await supabase.from('orders').insert([{ total, status: 'pending' }]).select().single();
            if(order) {
                const items = cart.map(i => ({ order_id: order.id, product_id: i.id, product_name: i.name, quantity: i.qty, price: i.price }));
                await supabase.from('order_items').insert(items);
                cart = []; localStorage.setItem('cart', JSON.stringify(cart)); updateCartUI(); closeCart(); showToast('Pesanan berhasil dibuat!');
            }
        }

        function filterByCategory(id) {
            const filtered = allProducts.filter(p => p.category_id === id);
            document.getElementById('products-grid').innerHTML = filtered.map(p => productCardHTML(p)).join('');
        }

        function searchProducts() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const res = allProducts.filter(p => p.name.toLowerCase().includes(q));
            document.getElementById('products-grid').innerHTML = res.map(p => productCardHTML(p)).join('');
        }
        document.getElementById('search-input').addEventListener('keyup', e => { if(e.key === 'Enter') searchProducts(); });

        function startCountdown() {
            const end = new Date(); end.setHours(23, 59, 59);
            setInterval(() => {
                const now = new Date();
                const diff = end - now;
                const h = Math.floor(diff / (1000*60*60));
                const m = Math.floor((diff % (1000*60*60)) / (1000*60));
                const s = Math.floor((diff % (1000*60)) / 1000);
                document.getElementById('h').textContent = h.toString().padStart(2, '0');
                document.getElementById('m').textContent = m.toString().padStart(2, '0');
                document.getElementById('s').textContent = s.toString().padStart(2, '0');
            }, 1000);
        }

        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
    </script>
</body>
</html>
