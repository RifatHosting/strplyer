<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOVA Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #fcfcfc;
      --bg-alt: #f4f4f4;
      --fg: #0a0a0a;
      --muted: #888;
      --accent: #0066ff;
      --accent-light: #e6f0ff;
      --danger: #ff0055;
      --card: #ffffff;
      --border: #e5e5e5;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--fg);
    }
    .font-display { font-family: 'Playfair Display', serif; }

    /* Smooth Page Transitions */
    .page-content { opacity: 0; transform: translateY(20px); animation: fadeIn 0.6s ease forwards; }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

    /* Product Card Hover Effect */
    .product-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
    .product-card img { transition: transform 0.5s ease; }
    .product-card:hover img { transform: scale(1.05); }

    /* Floating Cart Button */
    .cart-fab {
      position: fixed;
      bottom: 40px;
      right: 40px;
      width: 64px;
      height: 64px;
      background: var(--fg);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.2s;
      z-index: 100;
    }
    .cart-fab:hover { transform: scale(1.1); }
    .cart-fab .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--accent);
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Drawer */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
      z-index: 101; opacity: 0; visibility: hidden; transition: all 0.3s;
    }
    .drawer-overlay.open { opacity: 1; visibility: visible; }
    .drawer-panel {
      position: fixed; top: 0; right: 0; width: 100%; max-width: 480px; height: 100%;
      background: white; z-index: 102; transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column;
    }
    .drawer-overlay.open + .drawer-panel, .drawer-panel.open { transform: translateX(0); }

    /* Notification Toast */
    #notification-center {
      position: fixed; top: 20px; right: 20px; width: 320px; z-index: 200; display: flex; flex-direction: column; gap: 10px;
    }
    .toast {
      background: var(--fg); color: white; padding: 16px; border-radius: 8px; 
      animation: slideIn 0.3s ease, slideOut 0.3s ease 2.7s forwards;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { to { transform: translateX(100%); opacity: 0; } }

    /* Status Indicator */
    .live-indicator {
      display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted);
    }
    .live-dot { width: 8px; height: 8px; background: #00cc66; border-radius: 50%; animation: blink 2s infinite; }
    @keyframes blink { 50% { opacity: 0.5; } }

    /* Input Styles */
    .input-style {
      border: 1px solid var(--border); background: white; padding: 12px 16px; border-radius: 8px; width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-style:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

    /* Modal */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-backdrop.open { display: flex; }
    .modal-content { background: white; border-radius: 16px; width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; transform: scale(0.95); opacity: 0; transition: all 0.3s; }
    .modal-backdrop.open .modal-content { transform: scale(1); opacity: 1; }
  </style>
</head>
<body class="antialiased">

  <!-- Notification Area -->
  <div id="notification-center"></div>

  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 bg-[var(--bg)]/80 backdrop-blur-lg z-50 border-b border-[var(--border)]">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <a href="#" class="text-2xl font-bold tracking-tighter">NOVA<span class="text-[var(--accent)]">.</span></a>
      
      <div class="flex items-center gap-4">
        <div class="live-indicator hidden md:flex">
          <div class="live-dot"></div>
          <span>Real-time Connected</span>
        </div>
        
        <div class="relative">
          <input type="text" id="search-input" placeholder="Search..." class="input-style w-48 md:w-64 pl-10 text-sm">
          <svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-[var(--muted)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="pt-32 pb-24 px-6 page-content">
    <div class="max-w-7xl mx-auto">
      
      <!-- Hero Section -->
      <section class="mb-20">
        <h1 class="text-5xl md:text-7xl font-bold mb-6 tracking-tight leading-tight">
          Curated for <br><span class="font-display text-[var(--accent)]">Excellence</span>
        </h1>
        <p class="text-lg text-[var(--muted)] max-w-lg">Discover high-quality products updated in real-time. Manage your store seamlessly.</p>
      </section>

      <!-- Filter Bar -->
      <div class="flex items-center justify-between mb-10 border-b border-[var(--border)] pb-4">
        <div class="flex gap-2 overflow-x-auto" id="category-list">
          <!-- Categories generated by JS -->
        </div>
      </div>

      <!-- Product Grid -->
      <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
        <!-- Products generated by JS -->
      </div>
      
      <!-- Empty State -->
      <div id="empty-state" class="hidden text-center py-20">
        <h3 class="text-xl font-medium text-[var(--muted)]">No products found</h3>
      </div>

    </div>
  </main>

  <!-- Floating Cart Button -->
  <button id="cart-fab" class="cart-fab" onclick="toggleCart()">
    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
    <span id="cart-badge" class="badge hidden">0</span>
  </button>

  <!-- Cart Drawer -->
  <div id="cart-overlay" class="drawer-overlay" onclick="toggleCart()"></div>
  <aside id="cart-drawer" class="drawer-panel">
    <div class="p-8 border-b border-[var(--border)] flex justify-between items-center">
      <h2 class="text-xl font-bold">Your Cart</h2>
      <button onclick="toggleCart()" class="p-2 hover:bg-gray-100 rounded-full">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto p-8" id="cart-items">
      <!-- Cart items generated by JS -->
    </div>
    <div class="p-8 border-t border-[var(--border)] bg-gray-50">
      <div class="flex justify-between mb-6">
        <span class="text-[var(--muted)]">Subtotal</span>
        <span class="font-bold text-xl" id="cart-total">$0.00</span>
      </div>
      <button onclick="checkout()" class="w-full bg-black text-white py-4 rounded-lg font-semibold hover:bg-gray-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" id="checkout-btn">
        Checkout
      </button>
    </div>
  </aside>

  <!-- Product Detail Modal -->
  <div id="modal-backdrop" class="modal-backdrop" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div id="modal-body" class="grid md:grid-cols-2">
        <!-- Generated by JS -->
      </div>
    </div>
  </div>

  <script>
    // ==============================
    // SUPABASE CONFIGURATION
    // ==============================
    // Ganti dengan URL dan Key Anda dari Project Settings > API
    const SUPABASE_URL = 'https://ipdzrgctpfugquditjyr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwZHpyZ2N0cGZ1Z3F1ZGl0anlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTgxOTcsImV4cCI6MjA4ODI3NDE5N30.Z1Hkyaip0zPK70ygSh3GxC6SIRjg9lbp-haAH2CJ8uA';

    let db;
    let realtimeChannel;
    
    // Initialize Supabase
    if (SUPABASE_URL !== 'https://YOUR_PROJECT_URL.supabase.co') {
      db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    } else {
      console.warn("Supabase not configured. Running in Demo Mode.");
    }

    // ==============================
    // STATE MANAGEMENT
    // ==============================
    let products = [];
    let cart = JSON.parse(localStorage.getItem('nova_cart')) || [];
    let activeCategory = 'All';

    // ==============================
    // DATABASE FUNCTIONS
    // ==============================
    async function fetchProducts() {
      if (!db) return;
      
      const { data, error } = await db.from('products').select('*').order('created_at', { ascending: false });
      if (error) {
        console.error('Error fetching products:', error);
        showToast('Failed to load products');
        return;
      }
      
      products = data;
      renderProducts();
      renderCategories();
    }

    async function subscribeToChanges() {
      if (!db) return;
      
      // Listen for INSERT, UPDATE, DELETE on products table
      db.channel('public:products')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, (payload) => {
          if (payload.eventType === 'INSERT') {
            products.unshift(payload.new);
          } else if (payload.eventType === 'UPDATE') {
            const index = products.findIndex(p => p.id === payload.new.id);
            if (index > -1) products[index] = payload.new;
          } else if (payload.eventType === 'DELETE') {
            products = products.filter(p => p.id !== payload.old.id);
          }
          renderProducts();
          renderCategories();
          showToast('Product catalog updated');
        })
        .subscribe();
    }

    async function saveOrder(orderData) {
      if (!db) {
        showToast('Database not connected');
        return;
      }

      const { data, error } = await db.from('orders').insert([orderData]);
      
      if (error) {
        showToast('Order failed: ' + error.message);
        return false;
      }
      
      // Update stock locally for immediate UI feedback (DB will handle the logic via trigger ideally, but we do it here for demo)
      // Ideally use a Postgres function/trigger for atomic stock updates.
      // Here we just show the order success.
      
      return true;
    }

    async function updateProductStock(productId, newStock) {
       if(!db) return;
       const { error } = await db.from('products').update({ stock: newStock }).eq('id', productId);
       if (error) console.error("Stock update failed", error);
    }

    // ==============================
    // UI RENDERING
    // ==============================
    function renderCategories() {
      const container = document.getElementById('category-list');
      const categories = ['All', ...new Set(products.map(p => p.category).filter(Boolean))];
      
      container.innerHTML = categories.map(cat => `
        <button class="px-5 py-2 text-sm font-medium rounded-full transition-colors ${activeCategory === cat ? 'bg-black text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}" onclick="filterCategory('${cat}')">
          ${cat}
        </button>
      `).join('');
    }

    function filterCategory(cat) {
      activeCategory = cat;
      renderCategories();
      renderProducts();
    }

    function renderProducts() {
      const grid = document.getElementById('product-grid');
      const empty = document.getElementById('empty-state');
      
      let filtered = products;
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      
      if (activeCategory !== 'All') {
        filtered = filtered.filter(p => p.category === activeCategory);
      }
      if (searchTerm) {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm) || (p.description && p.description.toLowerCase().includes(searchTerm)));
      }

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      
      empty.classList.add('hidden');
      
      grid.innerHTML = filtered.map(p => `
        <article class="product-card bg-white rounded-2xl overflow-hidden border border-[var(--border)] cursor-pointer" onclick="openProductModal('${p.id}')">
          <div class="aspect-square overflow-hidden bg-gray-100 relative">
            ${p.image_url 
              ? `<img src="${p.image_url}" alt="${p.name}" class="w-full h-full object-cover">` 
              : `<div class="w-full h-full flex items-center justify-center text-gray-300 text-4xl font-bold">${p.name.charAt(0)}</div>`
            }
            ${p.stock <= 0 ? '<div class="absolute inset-0 bg-black/60 flex items-center justify-center text-white font-bold">SOLD OUT</div>' : ''}
          </div>
          <div class="p-5">
            <div class="flex justify-between items-start mb-2">
              <h3 class="font-semibold text-lg">${p.name}</h3>
              <span class="font-mono text-sm text-[var(--accent)]">${p.category || 'General'}</span>
            </div>
            <p class="text-[var(--muted)] text-sm mb-4 line-clamp-2 h-10">${p.description || ''}</p>
            <div class="flex justify-between items-center">
              <span class="text-xl font-bold">$${parseFloat(p.price).toFixed(2)}</span>
              ${p.stock > 0 && p.stock <= 5 ? `<span class="text-xs text-orange-500 font-medium">Only ${p.stock} left</span>` : `<span class="text-xs text-green-500"></span>`}
            </div>
          </div>
        </article>
      `).join('');
    }

    function renderCart() {
      const container = document.getElementById('cart-items');
      const badge = document.getElementById('cart-badge');
      const totalEl = document.getElementById('cart-total');
      const checkoutBtn = document.getElementById('checkout-btn');
      
      const totalItems = cart.reduce((sum, i) => sum + i.qty, 0);
      const totalPrice = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);

      if (totalItems > 0) {
        badge.textContent = totalItems;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
      
      totalEl.textContent = `$${totalPrice.toFixed(2)}`;
      checkoutBtn.disabled = cart.length === 0;

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="text-center py-16">
            <div class="text-4xl mb-4">🛒</div>
            <p class="text-[var(--muted)]">Your cart is empty</p>
          </div>
        `;
        return;
      }

      container.innerHTML = cart.map(item => `
        <div class="flex gap-4 mb-6 pb-6 border-b border-[var(--border)]">
          <div class="w-20 h-20 rounded-lg overflow-hidden bg-gray-100 flex-shrink-0">
             ${item.image_url ? `<img src="${item.image_url}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center font-bold">${item.name.charAt(0)}</div>`}
          </div>
          <div class="flex-1">
            <h4 class="font-semibold mb-1">${item.name}</h4>
            <p class="text-sm text-[var(--muted)] mb-2">$${parseFloat(item.price).toFixed(2)}</p>
            <div class="flex items-center gap-2">
              <button onclick="event.stopPropagation(); updateCart('${item.id}', -1)" class="w-8 h-8 rounded border border-[var(--border)] hover:bg-gray-100">-</button>
              <span class="w-8 text-center text-sm">${item.qty}</span>
              <button onclick="event.stopPropagation(); updateCart('${item.id}', 1)" class="w-8 h-8 rounded border border-[var(--border)] hover:bg-gray-100">+</button>
            </div>
          </div>
          <button onclick="event.stopPropagation(); removeCart('${item.id}')" class="text-[var(--muted)] hover:text-red-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
          </button>
        </div>
      `).join('');
    }

    // ==============================
    // INTERACTIONS
    // ==============================
    function toggleCart() {
      document.getElementById('cart-overlay').classList.toggle('open');
      document.getElementById('cart-drawer').classList.toggle('open');
    }

    function addToCart(product) {
      const existing = cart.find(i => i.id === product.id);
      const currentStock = product.stock;

      if (existing) {
        if (existing.qty < currentStock) {
          existing.qty++;
        } else {
          showToast('Maximum stock reached');
          return;
        }
      } else {
        if (currentStock <= 0) {
          showToast('Out of stock');
          return;
        }
        cart.push({ 
          id: product.id, 
          name: product.name, 
          price: product.price, 
          image_url: product.image_url,
          qty: 1 
        });
      }
      
      localStorage.setItem('nova_cart', JSON.stringify(cart));
      renderCart();
      showToast(`${product.name} added to cart`);
    }

    function updateCart(id, delta) {
      const item = cart.find(i => i.id === id);
      const product = products.find(p => p.id === id);
      if (!item || !product) return;

      const newQty = item.qty + delta;
      if (newQty <= 0) removeCart(id);
      else if (newQty <= product.stock) {
        item.qty = newQty;
        localStorage.setItem('nova_cart', JSON.stringify(cart));
        renderCart();
      } else {
        showToast('Maximum stock reached');
      }
    }

    function removeCart(id) {
      cart = cart.filter(i => i.id !== id);
      localStorage.setItem('nova_cart', JSON.stringify(cart));
      renderCart();
    }

    async function checkout() {
      if (cart.length === 0) return;

      const orderData = {
        items: cart.map(i => ({ id: i.id, name: i.name, qty: i.qty, price: i.price })),
        total: cart.reduce((sum, i) => sum + (i.price * i.qty), 0),
        status: 'pending'
      };

      // Optimistic UI update
      const success = await saveOrder(orderData);
      
      if (success) {
        // Decrease stock
        for (const item of cart) {
          const product = products.find(p => p.id === item.id);
          if (product) {
            await updateProductStock(item.id, product.stock - item.qty);
          }
        }
        
        cart = [];
        localStorage.setItem('nova_cart', JSON.stringify(cart));
        renderCart();
        toggleCart();
        showToast('Order placed successfully!');
      }
    }

    function openProductModal(id) {
      const p = products.find(prod => prod.id === id);
      if (!p) return;

      const modal = document.getElementById('modal-backdrop');
      const body = document.getElementById('modal-body');

      body.innerHTML = `
        <div class="h-64 md:h-auto bg-gray-100 overflow-hidden">
           ${p.image_url ? `<img src="${p.image_url}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-6xl font-bold text-gray-200">${p.name.charAt(0)}</div>`}
        </div>
        <div class="p-8 md:p-12 flex flex-col">
           <span class="text-xs font-bold uppercase text-[var(--accent)] mb-2 tracking-wider">${p.category || 'General'}</span>
           <h2 class="text-3xl font-bold mb-4">${p.name}</h2>
           <div class="prose text-[var(--muted)] mb-6 flex-1">
             <p>${p.description || 'No description available.'}</p>
           </div>
           <div class="flex items-center justify-between mb-6">
             <span class="text-3xl font-bold">$${parseFloat(p.price).toFixed(2)}</span>
             <span class="px-3 py-1 rounded-full text-xs font-medium ${p.stock > 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
               ${p.stock > 0 ? `${p.stock} in stock` : 'Out of stock'}
             </span>
           </div>
           <button onclick="addToCart(products.find(x => x.id === '${p.id}')); closeModal();" class="w-full py-4 bg-black text-white rounded-lg font-semibold hover:bg-gray-800 transition-colors" ${p.stock <= 0 ? 'disabled style="opacity:0.5; cursor:not-allowed"' : ''}>
             Add to Cart
           </button>
        </div>
      `;

      modal.classList.add('open');
    }

    function closeModal(e) {
       if (e && e.target !== e.currentTarget) return;
       document.getElementById('modal-backdrop').classList.remove('open');
    }

    function showToast(msg) {
      const center = document.getElementById('notification-center');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      center.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Search Listener
    document.getElementById('search-input').addEventListener('input', renderProducts);

    // Initialize
    fetchProducts();
    subscribeToChanges();
    renderCart();

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
        if (document.getElementById('cart-drawer').classList.contains('open')) toggleCart();
      }
    });
  </script>
</body>
</html>
